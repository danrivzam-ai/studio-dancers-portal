<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo blanco -->
  <rect width="512" height="512" fill="#ffffff"/>
  <!-- Isotipo Studio Dancers — figura bailarina -->
  <!-- Arco superior (morado oscuro) -->
  <path d="M 80 420 C 130 240 280 80 420 110"
        stroke="#551735" stroke-width="52" fill="none" stroke-linecap="round"/>
  <!-- Arco inferior (teal) -->
